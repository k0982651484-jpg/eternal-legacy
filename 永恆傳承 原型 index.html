<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b0e14">
<title>永恆傳承 — 原型 v0.2</title>
<style>
:root{
  --bg:#0b0e14; --panel:#12182a; --panel2:#0e1420;
  --gold:#c9a961; --gold-dim:#8a6d3b; --ink:#d8d3c4; --ink-dim:#8b8574;
  --hp:#b03a3a; --mp:#3a6ab0; --rage:#c46a2a; --xp:#7d5fb2; --en:#3f9e6e;
  --dmg:#e8b4b4; --heal:#9fd6a9; --loot:#e9d18a; --sys:#7fa8d8; --warn:#e0a458;
  --line:#2a3350;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--bg); color:var(--ink);
  font-family:"Microsoft JhengHei","PingFang TC","Noto Sans CJK TC","Heiti TC",sans-serif;
  font-size:15px; line-height:1.5; overflow:hidden;
  display:flex; flex-direction:column; height:100dvh;
  max-width:560px; margin:0 auto;
  border-left:1px solid var(--line); border-right:1px solid var(--line);
}
h1,h2,h3,.serif{font-family:"Noto Serif TC","PMingLiU","Songti TC",serif}
button{
  font-family:inherit; color:var(--ink); background:linear-gradient(180deg,#1b2340,#121830);
  border:1px solid var(--gold-dim); border-radius:4px;
  padding:9px 12px; font-size:14px; min-height:42px; cursor:pointer;
}
button:active{background:#0d1226}
button:disabled{opacity:.35; cursor:default}
button.gold{border-color:var(--gold); color:var(--gold)}
button.danger{border-color:#8a3b3b; color:#d99}
select,input,textarea{
  font-family:inherit; background:var(--panel2); color:var(--ink);
  border:1px solid var(--line); border-radius:4px; padding:8px; font-size:14px;
}
.hidden{display:none!important}

/* ===== 頂部狀態 ===== */
#hud{
  background:linear-gradient(180deg,#151d33,#0f1526);
  border-bottom:1px solid var(--gold-dim);
  padding:8px 10px 6px; flex:none;
}
#hudName{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px}
#hudName .nm{color:var(--gold); font-weight:bold; letter-spacing:1px}
#hudName .zone{font-size:12px; color:var(--ink-dim)}
.bar{position:relative; height:14px; background:#090c14; border:1px solid var(--line); border-radius:3px; margin:3px 0; overflow:hidden}
.bar>i{position:absolute; inset:0; width:50%; transition:width .25s}
.bar>span{position:absolute; inset:0; font-size:10px; line-height:12px; text-align:center; color:#fff; text-shadow:0 1px 2px #000; letter-spacing:1px}
.bar.hp>i{background:linear-gradient(180deg,#d05050,var(--hp))}
.bar.mp>i{background:linear-gradient(180deg,#5a8ad0,var(--mp))}
.bar.rage>i{background:linear-gradient(180deg,#e08a4a,var(--rage))}
.bar.xp>i{background:linear-gradient(180deg,#9a7dd2,var(--xp))}
.bar.en>i{background:linear-gradient(180deg,#5fbe8e,var(--en))}
.bar.ehp{height:18px}
.bar.ehp>i{background:linear-gradient(180deg,#c05858,#8a2f2f)}
.bar.ehp>span{font-size:11px; line-height:16px}
#hudBars2{display:flex; gap:6px}
#hudBars2>div{flex:1}
.microlabel{font-size:10px; color:var(--ink-dim); letter-spacing:1px}

/* ===== 主體 ===== */
#main{flex:1; overflow:hidden; position:relative; display:flex; flex-direction:column}
.page{position:absolute; inset:0; overflow-y:auto; padding:10px; display:none; -webkit-overflow-scrolling:touch}
.page.on{display:block}
#pgCombat{display:none; flex-direction:column; padding:0}
#pgCombat.on{display:flex}

/* 敵人面板 */
#enemyBox{flex:none; padding:8px 10px; background:var(--panel2); border-bottom:1px solid var(--line)}
#enemyRow{display:flex; justify-content:space-between; align-items:baseline}
#enemyName{color:#e0b0b0; font-weight:bold}
#enemyName .rank{color:var(--gold); font-size:12px}
#castBar{height:6px; background:#090c14; border-radius:3px; margin-top:4px; overflow:hidden}
#castBar>i{display:block; height:100%; width:0; background:var(--warn)}
#castLabel{font-size:11px; color:var(--warn); height:16px}

/* 戰鬥文字流(主視覺) */
#log{
  flex:1; overflow-y:auto; padding:10px 12px;
  background:
    radial-gradient(ellipse at 50% -20%, #1a2340 0%, transparent 60%),
    var(--bg);
  font-size:13.5px;
}
#log p{margin:2px 0; color:var(--ink-dim); animation:fadein .3s}
#log p b{font-weight:normal}
@keyframes fadein{from{opacity:0; transform:translateY(3px)}to{opacity:1}}
.l-dmg{color:var(--dmg)} .l-take{color:#e29a9a} .l-heal{color:var(--heal)}
.l-loot{color:var(--loot)} .l-sys{color:var(--sys)} .l-warn{color:var(--warn)}
.l-lvl{color:var(--gold); font-weight:bold}
.l-crit{color:#ffd27d}

/* 技能列 */
#skillBar{
  flex:none; display:flex; gap:6px; padding:8px; overflow-x:auto;
  background:var(--panel2); border-top:1px solid var(--line);
}
#skillBar button{flex:none; min-width:74px; font-size:13px; padding:6px 8px; position:relative; overflow:hidden}
#skillBar button .cd{position:absolute; inset:0; background:rgba(0,0,0,.65); transform-origin:bottom; pointer-events:none}
#skillBar button .cost{display:block; font-size:10px; color:var(--ink-dim)}
#combatCtl{flex:none; display:flex; gap:6px; padding:0 8px 8px; background:var(--panel2)}
#combatCtl button{flex:1; font-size:13px}
#combatCtl .modeOn{border-color:var(--en); color:#9fd6a9}

/* 通用卡片 */
.card{background:var(--panel); border:1px solid var(--line); border-radius:6px; padding:10px 12px; margin-bottom:10px}
.card h3{color:var(--gold); font-size:15px; margin-bottom:6px; letter-spacing:1px; border-bottom:1px solid var(--line); padding-bottom:4px}
.kv{display:flex; justify-content:space-between; padding:2px 0; font-size:14px}
.kv span:first-child{color:var(--ink-dim)}
.row{display:flex; gap:8px; align-items:center; padding:6px 0; border-bottom:1px dashed #202a45}
.row:last-child{border-bottom:none}
.row .grow{flex:1}
.row small{color:var(--ink-dim); display:block; font-size:12px}
.tag{font-size:11px; border:1px solid var(--gold-dim); color:var(--gold); border-radius:3px; padding:0 4px}
.q-white{color:#cfcfcf}.q-green{color:#7ec97e}.q-blue{color:#6da8e8}

/* ===== 底部導航 ===== */
#nav{
  flex:none; display:flex; background:linear-gradient(180deg,#151d33,#0d1220);
  border-top:1px solid var(--gold-dim);
  padding-bottom:env(safe-area-inset-bottom);
}
#nav button{
  flex:1; background:none; border:none; border-radius:0; color:var(--ink-dim);
  font-size:12px; padding:9px 0 10px; min-height:48px; letter-spacing:2px;
}
#nav button.on{color:var(--gold); text-shadow:0 0 8px rgba(201,169,97,.4)}
#nav button .dot{color:var(--warn)}

/* ===== 開場/彈窗 ===== */
#overlay{
  position:fixed; inset:0; background:rgba(4,6,12,.92); z-index:50;
  display:flex; align-items:center; justify-content:center; padding:16px;
}
#overlay .box{
  width:100%; max-width:420px; max-height:88dvh; overflow-y:auto;
  background:var(--panel); border:1px solid var(--gold); border-radius:8px; padding:18px;
  box-shadow:0 0 40px rgba(201,169,97,.15);
}
#overlay h1{color:var(--gold); text-align:center; font-size:24px; letter-spacing:6px; margin-bottom:2px}
#overlay .sub{text-align:center; color:var(--ink-dim); font-size:12px; letter-spacing:2px; margin-bottom:14px}
.pickGrid{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:8px 0}
.pick{border:1px solid var(--line); border-radius:6px; padding:10px; cursor:pointer; background:var(--panel2)}
.pick.on{border-color:var(--gold); box-shadow:0 0 10px rgba(201,169,97,.25)}
.pick b{color:var(--gold); display:block; margin-bottom:2px}
.pick small{color:var(--ink-dim); font-size:11px; line-height:1.4; display:block}
.pick.dis{opacity:.35; pointer-events:none}
textarea{width:100%; height:110px; font-size:11px}
@media (min-width:900px){ body{max-width:640px; font-size:16px} }
</style>
</head>

  <div class="page" id="pgChar"></div>
  <!-- 背包頁 -->
  <div class="page" id="pgBag"></div>

  <div class="page" id="pgQuest"></div>
  <!-- 城鎮頁 -->
  <div class="page" id="pgTown"></div>

</div>

<!-- 底部導航 -->
<div id="nav">

</div>

  xpNeed: L => 40*L*L + 360*L,
  mobHp:  L => 63*L + 120,
  mobAtk: L => 6 + 2*L,             // 每 2 秒一擊
  mobXp:  L => 45 + 5*L,
  pHp:    L => 30*L + 90,
  wDpsWhite: L => 2.1*L + 4,
  statDps:  L => 1.8*L + 4,          // 屬性/技能係數的自動攻擊貢獻
  armorDR: (armor, atkL) => Math.min(0.75, armor/(armor + 85*atkL + 400)),
  repairCost: (lv, q, lost) => Math.ceil(lv * q * lost * 2), // 銅(=0.02銀)
};

const LVCAP = 10;

<script>
/* ===== 狀態與存檔 ===== */
const SAVEKEY = 'eternal_legacy_proto_v01';      // 舊版單角色(自動遷移)
const ROSTERKEY = 'eternal_legacy_roster_v1';    // 角色名冊(8 欄位)
const MAXCHARS = 8;
let S = null;            // 玩家狀態
let mob = null;          // 當前敵人
let casting = null;      // {sk,end,total,byMob}
let lastTick = Date.now();
const $ = id => document.getElementById(id);

function newState(name, race, cls){
  return {
    v:1, name, race, cls, zone:RACES[race].zone,
    lv:1, xp:0, hp:F.pHp(1), res:0, combo:0, form:null,
    gold:0, energy:100, rest:0, mode:'manual',
    bag:{ it_hpot:3 }, herbSkill:0, alchSkill:0,
    eq:{ w:mkEq(STARTW[cls]), c:mkEq('c_start') },
    qi:0, qn:0, qdone:false,          // 任務索引/計數/待回報
    kills:0, deaths:0, shards:0,
    pet:false, stance:false, cds:{}, potCd:0,
    ts:Date.now(), created:Date.now(), rareCd:0,
  };
}
function mkEq(id){ const e=EQUIPS[id]; return {id, dur:e.dmax}; }
let R={ list:[], active:-1 };
function loadRoster(){
  try{
    const t=localStorage.getItem(ROSTERKEY);
    if(t) return JSON.parse(t);
    const old=localStorage.getItem(SAVEKEY);           // 舊存檔遷移
    if(old){ const s=JSON.parse(old); localStorage.removeItem(SAVEKEY); return {list:[s], active:0}; }
  }catch(e){}
  return {list:[], active:-1};
}
function save(){
  if(S && R.active>=0){ S.ts=Date.now(); R.list[R.active]=S; }
  try{ localStorage.setItem(ROSTERKEY, JSON.stringify(R)); }catch(e){}
}

/* ===== 數值輔助 ===== */
function wdps(){ const e=S.eq.w, d=EQUIPS[e.id]; return e.dur>0 ? d.dps : 0; }
function armor(){ const e=S.eq.c, d=EQUIPS[e.id]; return (e.dur>0 && d.armor)? d.armor : 0; }
function maxHp(){ return Math.round(F.pHp(S.lv)*(S.race==='broadhoof'?1.05:1)); }
function resMax(){ const C=CLASSES[S.cls]; return Math.round(C.resMax*(S.race==='cogling'?1.15:1)); }
function swingDmg(){                       // 每 2 秒一次的自動攻擊
  let base=(wdps()+F.statDps(S.lv))*2;
  if(S.pet) base*=1.12;
  if(S.buffs) for(const b of S.buffs) if(b.stat==='atk') base*=(1+b.bp/10000);
  if(S.stance) base*=0.9;
  if(S.form==='bear') base*=0.85;
  if(S.form==='cat')  base*=1.15;
  return base;
}
function vary(x){ return Math.max(1, Math.round(x*(0.85+Math.random()*0.3))); }
function fmtG(c){ const g=Math.floor(c/10000), s=Math.floor(c%10000/100), b=c%100;
  return (g?g+'金':'')+(s?s+'銀':'')+((b||(!g&&!s))?b+'銅':''); }
function fmtT(s){ s=Math.round(s); const h=Math.floor(s/3600),m=Math.floor(s%3600/60);
  return (h?h+'小時':'')+(m?m+'分':'')+(!h&&!m?s+'秒':''); }

/* ===== 戰鬥文字流 ===== */
function log(html, cls){
  const box=$('log'), p=document.createElement('p');
  if(cls) p.className=cls; p.innerHTML='› '+html;
  box.appendChild(p);
  while(box.children.length>80) box.removeChild(box.firstChild);
  box.scrollTop=box.scrollHeight;
}

/* ===== 敵人 ===== */
function spawn(mid, forced){
  const z=ZONES[S.zone];
  let def=z.mobs.find(m=>m.id===mid);
  // 稀有怪突襲:4% 機率(30 分鐘冷卻)
  if(!forced && Date.now()>S.rareCd && Math.random()<0.04){
    def=z.mobs.find(m=>m.rank==='rare'); S.rareCd=Date.now()+1800000;
    log('<b class="l-warn">大地一陣震動……稀有怪物現身!</b>','l-warn');
  }
  const r=RANK[def.rank];
  mob={ def, hp:Math.round(F.mobHp(def.lv)*r.hp), hpMax:Math.round(F.mobHp(def.lv)*r.hp),
        atk:Math.round(F.mobAtk(def.lv)*r.atk), nextAtk:Date.now()+1500, nextSwing:Date.now()+400,
        cast:null, debuffs:[] };
  S.buffs=S.buffs||[];
  if(S.race==='warfang') addBuff({stat:'atk',bp:1000,dur:15000}, '血怒湧動:攻擊+10%!');
  log('遭遇 <b style="color:#e0b0b0">'+def.name+'</b> Lv'+def.lv+' <span class="l-warn">'+r.t+'</span>');
  pSwing=Date.now()+(((S.buffs||[]).some(b=>b.stat==='stealth'))?2600:700);
  // AI 開場技
  if(S.mode==='auto') aiOpener();
  renderEnemy();
}
function despawn(){ mob=null; casting=null; if(S) S.combo=0; renderEnemy(); }

/* ===== Buff / DoT ===== */
function addBuff(b, msg){ S.buffs=S.buffs||[]; S.buffs.push({...b, end:Date.now()+b.dur}); if(msg) log(msg,'l-sys'); }
function drTotal(){
  let dr=F.armorDR(armor(), mob?mob.def.lv:S.lv);
  if(S.stance) dr=1-(1-dr)*0.9;
  if(S.buffs) for(const b of S.buffs) if(b.stat==='dr') dr=1-(1-dr)*(1-b.bp/10000);
  if(S.form==='bear') dr=1-(1-dr)*0.8;
  if(S.form==='cat')  dr=Math.max(0,1-(1-dr)*1.1);
  return Math.min(0.95,dr);
}

/* ===== 玩家技能 ===== */
function learned(){ return Object.entries(SKILLS).filter(([k,s])=>s.cls===S.cls && s.lv<=S.lv); }
function canCast(k){
  const sk=SKILLS[k]; if(!sk) return false;
  if(casting) return false;
  if((S.cds[k]||0)>Date.now()) return false;
  if(sk.cost>0 && S.res<sk.cost) return false;
  if(sk.req==='stealth' && !(S.buffs||[]).some(b=>b.stat==='stealth')) return false;
  if((sk.type==='fin'||sk.type==='findot') && !(S.combo>0)) return false;
  if(sk.type==='stealth' && mob) return false;
  if(!['stance','pet','form','stealth','drain','heal','hot','shield'].includes(sk.type) && !mob) return false;
  return true;
}
function useSkill(k, silent){
  if(!canCast(k)) return false;
  const sk=SKILLS[k];
  if(sk.cast){ casting={sk:k, end:Date.now()+sk.cast, total:sk.cast}; return true; }
  resolveSkill(k); return true;
}
function resolveSkill(k){
  const sk=SKILLS[k];
  S.res=Math.max(0,Math.min(resMax(), S.res-sk.cost));
  S.cds[k]=Date.now()+(sk.cd||0)+1500;   // 含 GCD
  const base=swingDmg();
  if(sk.type==='dmg' && mob){
    let d=(sk.wbp?base*sk.wbp/10000:0)+(sk.flat||0)+(sk.spell?base*sk.spell:0);
    hitMob(vary(d), sk.name);
    if(sk.cp) S.combo=Math.min(5,(S.combo||0)+sk.cp);
    if(sk.debuff && mob) mob.debuffs.push({...sk.debuff, end:Date.now()+sk.debuff.dur});
  }
  else if(sk.type==='fin' && mob){
    const c=S.combo; S.combo=0;
    hitMob(vary(base*0.55*c+10*c), sk.name+'('+c+'星)');
  }
  else if(sk.type==='findot' && mob){
    const c=S.combo; S.combo=0;
    mob.debuffs.push({dot:1, dps:0.5*c*F.statDps(S.lv), end:Date.now()+6000+2000*c, nm:sk.name});
    log(sk.name+'('+c+'星):流血侵蝕目標','l-dmg');
  }
  else if(sk.type==='stun' && mob){
    mob.stunEnd=Date.now()+sk.dur; mob.cast=null;
    mob.nextAtk=Math.max(mob.nextAtk, mob.stunEnd);
    log(sk.msg,'l-warn');
    if(sk.wbp) hitMob(vary(base*sk.wbp/10000), sk.name);
  }
  else if(sk.type==='interrupt' && mob){
    let bonus=1;
    if(mob.cast){ mob.cast=null; bonus=1.3; log('你打斷了敵人的詠唱!','l-warn'); }
    hitMob(vary(base*(sk.spell||0.5)*bonus), sk.name);
  }
  else if(sk.type==='drain'){
    const c=Math.round(maxHp()*0.12);
    if(S.hp>c+5){ S.hp-=c; S.res=Math.min(resMax(),S.res+25); log('生命分流:-'+c+' 生命 → +25 法力','l-sys'); }
    else log('生命不足,無法分流','l-warn');
  }
  else if(sk.type==='stealth'){
    addBuff({stat:'stealth', dur:20000}, '你隱入陰影……(遭遇敵人後施展偷襲)');
  }
  else if(sk.type==='form'){
    S.form=(S.form===sk.form?null:sk.form);
    log(S.form?(sk.form==='bear'?'化為巨熊:受傷-20%/傷害-15%':'化為獵豹:傷害+15%/受傷+10%'):'解除形態,回復人形','l-sys');
  }
  else if(sk.type==='dot' && mob){ mob.debuffs.push({dot:1, dps:sk.dps*F.statDps(S.lv), end:Date.now()+sk.dur, nm:sk.name2}); log(sk.name+':<b class="l-dmg">'+sk.name2+'</b> 開始侵蝕目標','l-dmg'); }
  else if(sk.type==='heal'){ const h=vary(base*sk.mult); S.hp=Math.min(maxHp(),S.hp+h); log(sk.name+' 恢復 <b class="l-heal">'+h+'</b> 生命','l-heal'); }
  else if(sk.type==='hot'){ addBuff({hot:1, hps:sk.hps*F.statDps(S.lv), dur:sk.dur}, sk.name+':持續恢復生效'); }
  else if(sk.type==='shield'){ S.shield=Math.round(base*sk.mult); S.shieldEnd=Date.now()+30000; log(sk.name+':吸收護盾 <b class="l-heal">'+S.shield+'</b>','l-heal'); }
  else if(sk.type==='buff'){
    if(sk.onEnemy&&mob){ mob.debuffs.push({stat:sk.stat,bp:sk.bp,end:Date.now()+sk.dur}); log(sk.msg,'l-sys'); }
    else addBuff({stat:sk.stat,bp:sk.bp,dur:sk.dur}, sk.msg);
  }
  else if(sk.type==='stance'){ S.stance=!S.stance; log(S.stance?'進入防禦姿態(受傷-10%/傷害-10%)':'解除防禦姿態','l-sys'); }
  else if(sk.type==='pet'){ if(!S.pet){ S.pet=true; log(S.cls==='warlock'?'一隻小鬼從虛空竄出,聽候差遣!自動攻擊傷害+12%':'你馴服了一頭野獸夥伴!自動攻擊傷害+12%','l-lvl'); } }
  if(sk.req==='stealth') S.buffs=(S.buffs||[]).filter(b=>b.stat!=='stealth');
  renderSkills();
}
function hitMob(d, src){
  if(!mob) return;
  let crit=Math.random()<0.05; if(crit) d*=2;
  for(const db of mob.debuffs) if(db.stat==='takemore') d*=(1+db.bp/10000);
  d=Math.round(d); mob.hp-=d;
  log((src||'攻擊')+' 命中 '+mob.def.name+' <b class="'+(crit?'l-crit':'l-dmg')+'">-'+d+(crit?' 暴擊!':'')+'</b>', crit?'l-crit':'l-dmg');
  if(mob.hp<=0) killMob();
}

/* ===== 擊殺/掉落/經驗 ===== */
function gainMult(){ let m = S.energy>0?1:0.5; if(S.rest>0) m*=1.25; return m; }
function killMob(){
  const def=mob.def, r=RANK[def.rank];
  S.kills++;
  if(S.race==='soulbound' && S.hp<maxHp()){ S.hp=Math.min(maxHp(), S.hp+maxHp()*0.05); }
  let xp=Math.round(F.mobXp(def.lv)*r.xp*gainMult());
  log('<b style="color:#e0b0b0">'+def.name+'</b> 被擊敗!獲得 <b class="l-lvl">'+xp+'</b> 經驗','l-sys');
  rollLoot(def);
  if(def.rank!=='normal'&&def.bossDrop){
    giveEquip(def.bossDrop);
  }
  questKill(def.id);
  despawn();
  gainXp(xp);
  if(S.mode==='auto') setTimeout(()=>{ if(S.mode==='auto'&&!mob) spawn(currentHunt()); }, 1200);
  renderHUD();
}
function rollLoot(def){
  for(const l of def.loot){
    if(l[0]==='coin'){ const c=l[1]+Math.floor(Math.random()*(l[2]-l[1]+1)); S.gold+=c; log('拾取 <b class="l-loot">'+fmtG(c)+'</b>','l-loot'); }
    else if(Math.random()*10000<l[1]){ addItem(l[0],1); }
  }
  if(def.beast && Math.random()<0.5){ addItem('it_leather',1); } // 剝皮簡化
}
function addItem(id,n){
  S.bag[id]=(S.bag[id]||0)+n;
  const it=ITEMS[id];
  if(id.startsWith('it_shard')) S.shards+=n;
  log('拾取 <b class="l-loot q-'+it.q+'">['+it.name+']</b>'+(n>1?'×'+n:''),'l-loot');
}
function giveEquip(id){
  const e=EQUIPS[id];
  S.bag['EQ_'+id]=(S.bag['EQ_'+id]||0)+1;
  log('獲得裝備 <b class="q-'+e.q+'">['+e.name+']</b>!至背包裝備','l-lvl');
}
function gainXp(xp){
  if(S.lv>=LVCAP) return;
  S.xp+=xp;
  while(S.lv<LVCAP && S.xp>=F.xpNeed(S.lv)){
    S.xp-=F.xpNeed(S.lv); S.lv++;
    S.hp=maxHp(); S.res=S.cls==='warrior'?S.res:resMax();
    log('<b>═══ 等級提升!Lv'+S.lv+' ═══</b>','l-lvl');
    for(const [k,sk] of learned()) if(sk.lv===S.lv) log('習得新技能:<b class="l-lvl">'+sk.name+'</b>','l-lvl');
    if(S.lv===LVCAP){ log('<b>你已抵達垂直切片等級上限 Lv10——完成最終任務吧!</b>','l-lvl'); S.xp=0; }
    renderSkills();
  }
}

/* ===== 玩家死亡(GDB 1.4:只扣耐久) ===== */
function playerDie(){
  S.deaths++;
  log('<b class="l-take">你倒下了……靈魂返回'+ZONES[S.zone].town+'</b>','l-take');
  for(const s of ['w','c']){ const e=S.eq[s]; e.dur=Math.max(0,e.dur-Math.ceil(EQUIPS[e.id].dmax*0.1)); }
  log('全身裝備耐久 -10%(不掉等/不掉經驗/不掉裝/不掉錢)','l-warn');
  S.hp=maxHp(); S.res=0; S.shield=0; S.buffs=[];
  despawn();
  if(S.mode==='auto') setTimeout(()=>{ if(S.mode==='auto'&&!mob) spawn(currentHunt()); }, 2500);
}

/* ===== AI 技能組(掛機模式;效率 ≈ 手動 80%) ===== */
function aiOpener(){
  if(S.cls==='warrior') useSkill('sk_charge');
  if(S.cls==='ranger' && S.lv>=10) useSkill('sk_mark');
  if(S.cls==='paladin' && !(S.buffs||[]).some(b=>b.stat==='atk')) useSkill('sk_seal');
  if(S.cls==='shaman' && !(S.buffs||[]).some(b=>b.stat==='dr')) useSkill('sk_stoneskin');
}
function aiStep(){
  if(S.potCd<Date.now() && S.hp<maxHp()*0.35 && (S.bag.it_hpot||0)>0){ usePotion('it_hpot'); return; }
  if(S.cls==='warrior'){
    if(S.hp<maxHp()*0.4 && canCast('sk_wall')) return useSkill('sk_wall');
    if(!(S.buffs||[]).some(b=>b.stat==='atk') && canCast('sk_shout')) return useSkill('sk_shout');
    if(S.res>=40 && canCast('sk_heroic')) return useSkill('sk_heroic');
    if(canCast('sk_thunder') && S.res>=60) return useSkill('sk_thunder');
  }else if(S.cls==='ranger'){
    if(mob && !mob.debuffs.some(d=>d.dot) && canCast('sk_serpent')) return useSkill('sk_serpent');
    if(canCast('sk_aimed')) return useSkill('sk_aimed');
    if(canCast('sk_arcshot')) return useSkill('sk_arcshot');
  }else if(S.cls==='priest'){
    if(S.hp<maxHp()*0.6 && !S.shield && canCast('sk_pws')) return useSkill('sk_pws');
    if(S.hp<maxHp()*0.75 && !(S.buffs||[]).some(b=>b.hot) && canCast('sk_renew')) return useSkill('sk_renew');
    if(S.hp<maxHp()*0.45 && canCast('sk_flash')) return useSkill('sk_flash');
    if(mob && S.lv>=10 && !mob.debuffs.some(d=>d.dot) && canCast('sk_swp')) return useSkill('sk_swp');
    if(canCast('sk_blast')) return useSkill('sk_blast');
    if(S.res>=40 && canCast('sk_smite')) return useSkill('sk_smite');
  }else if(S.cls==='paladin'){
    if(S.hp<maxHp()*0.25 && canCast('sk_bubble')) return useSkill('sk_bubble');
    if(S.hp<maxHp()*0.5 && canCast('sk_holylight')) return useSkill('sk_holylight');
    if(!(S.buffs||[]).some(b=>b.stat==='atk') && canCast('sk_seal')) return useSkill('sk_seal');
    if(mob && mob.cast && canCast('sk_hammer')) return useSkill('sk_hammer');
    if(canCast('sk_judge')) return useSkill('sk_judge');
  }else if(S.cls==='rogue'){
    if(mob && mob.cast && canCast('sk_kick')) return useSkill('sk_kick');
    if(S.combo>=5 && S.lv>=10 && mob && !mob.debuffs.some(d=>d.dot) && canCast('sk_rupture')) return useSkill('sk_rupture');
    if(S.combo>=5 && canCast('sk_evis')) return useSkill('sk_evis');
    if(canCast('sk_ambush')) return useSkill('sk_ambush');
    if(canCast('sk_sinister')) return useSkill('sk_sinister');
  }else if(S.cls==='shaman'){
    if(mob && mob.cast && canCast('sk_eshock')) return useSkill('sk_eshock');
    if(S.hp<maxHp()*0.55 && canCast('sk_healwave')) return useSkill('sk_healwave');
    if(!(S.buffs||[]).some(b=>b.stat==='dr') && canCast('sk_stoneskin')) return useSkill('sk_stoneskin');
    if(S.lv>=6 && !(S.buffs||[]).some(b=>b.stat==='atk') && canCast('sk_ftongue')) return useSkill('sk_ftongue');
    if(canCast('sk_novatot')) return useSkill('sk_novatot');
    if(canCast('sk_bolt')) return useSkill('sk_bolt');
  }else if(S.cls==='mage'){
    if(S.hp<maxHp()*0.5 && canCast('sk_nova')) return useSkill('sk_nova');
    if(S.lv>=10 && !(S.buffs||[]).some(b=>b.stat==='atk') && canCast('sk_arcint')) return useSkill('sk_arcint');
    if(canCast('sk_fireblast')) return useSkill('sk_fireblast');
    if(canCast('sk_missiles')) return useSkill('sk_missiles');
    if(canCast('sk_fireball')) return useSkill('sk_fireball');
  }else if(S.cls==='warlock'){
    if(mob && !mob.debuffs.some(d=>d.dot) && canCast('sk_corr')) return useSkill('sk_corr');
    if(S.hp<maxHp()*0.4 && canCast('sk_fear')) return useSkill('sk_fear');
    if(S.res<30 && S.hp>maxHp()*0.7 && canCast('sk_tap')) return useSkill('sk_tap');
    if(S.lv>=10 && mob && mob.debuffs.filter(d=>d.dot).length<2 && canCast('sk_immo')) return useSkill('sk_immo');
    if(canCast('sk_sbolt')) return useSkill('sk_sbolt');
  }else if(S.cls==='druid'){
    if(S.hp<maxHp()*0.4 && S.lv>=6 && S.form!=='bear' && canCast('sk_bear')) return useSkill('sk_bear');
    if(S.hp<maxHp()*0.75 && !(S.buffs||[]).some(b=>b.hot) && canCast('sk_rejuv')) return useSkill('sk_rejuv');
    if(S.hp<maxHp()*0.4 && canCast('sk_touch')) return useSkill('sk_touch');
    if(mob && mob.cast && canCast('sk_maul')) return useSkill('sk_maul');
    if(canCast('sk_moonfire') && S.res>=60) return useSkill('sk_moonfire');
  }
}
function usePotion(id){
  if((S.bag[id]||0)<1 || S.potCd>Date.now()) return;
  S.bag[id]--; S.potCd=Date.now()+ITEMS[id].cd;
  if(ITEMS[id].pot==='hp'){ const h=Math.round(maxHp()*ITEMS[id].val); S.hp=Math.min(maxHp(),S.hp+h); log('飲下藥水,恢復 <b class="l-heal">'+h+'</b> 生命','l-heal'); }
  else { const m=Math.round(resMax()*ITEMS[id].val); S.res=Math.min(resMax(),S.res+m); log('飲下藥水,恢復 <b class="l-heal">'+m+'</b> '+CLASSES[S.cls].resName,'l-heal'); }
  renderBag();
}

/* ===== 任務 ===== */
function curQ(){ return QUESTS[S.zone][S.qi]||null; }
function questKill(mid){
  const q=curQ(); if(!q||S.qdone) return;
  if((q.type==='kill'||q.type==='boss') && q.tgt===mid){ S.qn++; checkQ(); }
  if(q.type==='collect'){ S.qn=S.bag[q.tgt]||0; checkQ(); }
  renderQuestDot();
}
function checkQ(){
  const q=curQ(); if(!q) return;
  if(q.type==='collect') S.qn=Math.min(S.bag[q.tgt]||0,q.n);
  if(S.qn>=q.n && !S.qdone){ S.qdone=true; log('任務 <b class="l-lvl">['+q.name+']</b> 目標達成!至任務頁回報','l-lvl'); }
  renderQuestDot();
}
function reportQ(){
  const q=curQ(); if(!q||!S.qdone) return;
  if(q.type==='collect'){ S.bag[q.tgt]-=q.n; if(S.bag[q.tgt]<=0) delete S.bag[q.tgt]; }
  const xp=Math.round(6*F.mobXp(q.lv)*(q.type==='boss'?2:1));
  log('完成任務 <b class="l-lvl">['+q.name+']</b>,獲得 '+xp+' 經驗','l-lvl');
  if(q.rw.item){ addItem(q.rw.item[0],q.rw.item[1]); }
  if(q.rw.equip){ giveEquip(q.rw.equip==='w_q4'?CLASS_W[S.cls]:q.rw.equip); }
  S.qi++; S.qn=0; S.qdone=false;
  gainXp(xp);
  const nq=curQ();
  if(nq){ log('接受新任務:<b class="l-sys">['+nq.name+'] '+nq.brief+'</b>','l-sys'); if(nq.type==='collect') checkQ(); }
  else log('<b>═══ 垂直切片全任務完成!感謝試玩 ═══</b>','l-lvl');
  renderQuest(); renderQuestDot(); renderTown(); save();
}
function renderQuestDot(){ $('qDot').textContent = (S&&S.qdone)?' ●':''; }

/* ===== 採集與煉金(副職業切片) ===== */
let gatherCd=0;
function gather(){
  if(Date.now()<gatherCd) return;
  gatherCd=Date.now()+8000;
  const herb=ZONES[S.zone].herb;
  const n=1+(Math.random()<0.3?1:0);
  addItem(herb,n); S.herbSkill++;
  if(Math.random()<0.03){ addItem(Math.random()<0.5?'it_shardW':'it_shardE',1); log('<b class="l-warn">草叢間閃著微光——元素之心碎片!</b>','l-warn'); }
  if(curQ()&&curQ().type==='collect') checkQ();
  renderBag();
}
function craftPot(){
  const herb=ZONES[S.zone].herb;
  if((S.bag[herb]||0)<2){ log('材料不足:需要 '+ITEMS[herb].name+'×2','l-warn'); return; }
  S.bag[herb]-=2; if(S.bag[herb]<=0) delete S.bag[herb];
  addItem('it_hpot',1); S.alchSkill++;
  renderTown(); renderBag();
}
</script>
<script>
/* ===== 主迴圈 ===== */
let pSwing=0, lastUi=0;
function tick(){
  const now=Date.now(), dt=Math.min(1000, now-lastTick); lastTick=now;
  if(!S) return;
  const sec=dt/1000;

  // 資源與回復
  const C=CLASSES[S.cls];
  if(C.res==='mana') S.res=Math.min(resMax(), S.res+C.regen*sec*(mob?1:2));
  else if(C.res==='energy') S.res=Math.min(resMax(), S.res+10*sec);
  else if(!mob) S.res=Math.max(0, S.res-2*sec);
  if(!mob && S.hp<maxHp()) S.hp=Math.min(maxHp(), S.hp+maxHp()*0.02*sec);
  if(S.race==='mireshade' && mob && S.hp<maxHp()) S.hp=Math.min(maxHp(), S.hp+maxHp()*0.01*sec);

  // Buff / HoT / 護盾
  if(S.buffs){
    for(const b of S.buffs) if(b.hot && S.hp<maxHp()) S.hp=Math.min(maxHp(), S.hp+b.hps*sec);
    S.buffs=S.buffs.filter(b=>b.end>now);
  }
  if(S.shield && S.shieldEnd<now) S.shield=0;

  // 精力/安逸
  if(S.mode==='auto'){ S.energy=Math.max(0, S.energy-8/3600*sec); if(mob&&S.rest>0) S.rest=Math.max(0,S.rest-sec); }
  else S.energy=Math.min(100, S.energy+4/3600*sec);

  // 施法
  if(casting && now>=casting.end){ const k=casting.sk; casting=null; resolveSkill(k); }

  // 玩家自動攻擊
  if(mob && !casting && now>=pSwing){
    pSwing=now+2000;
    hitMob(vary(swingDmg()));
    if((S.buffs||[]).some(b=>b.stat==='stealth')) S.buffs=S.buffs.filter(b=>b.stat!=='stealth');
    if(C.res==='rage') S.res=Math.min(C.resMax, S.res+12);
  }

  // AI 技能組
  if(S.mode==='auto' && mob) aiStep();

  // 敵人行動
  if(mob){
    for(const d of mob.debuffs) if(d.dot){ mob.hp-=d.dps*sec; }
    if(mob.hp<=0){ killMob(); }
    else{
      mob.debuffs=mob.debuffs.filter(d=>d.end>now);
      if(mob.stunEnd && now<mob.stunEnd){ /* 暈眩/凍結/恐懼中 */ }
      else if(mob.cast && now>=mob.cast.end){ mobHit(mob.atk*1.7, mob.cast.nm); mob.cast=null; }
      else if(!mob.cast && now>=mob.nextAtk){
        let iv=2000; for(const d of mob.debuffs) if(d.stat==='atkspd') iv*=(1-d.bp/10000);
        mob.nextAtk=now+iv;
        if(mob.def.caster && Math.random()<0.35) mob.cast={end:now+2200,total:2200,nm:'魔焰箭'};
        else mobHit(mob.atk,null);
      }
    }
  }

  // UI(每 250ms 夠用;文字渲染低耗)
  if(now-lastUi>240){ lastUi=now; renderHUD(); renderEnemy(); renderSkillCds(); }
}
function mobHit(raw, nm){
  if(S.race==='starborn' && Math.random()<0.04){ log('你敏捷地閃過了攻擊!','l-sys'); return; }
  let d=vary(raw*(1-drTotal())*(S.race==='stonewrought'?0.95:1));
  if(S.shield>0){ const ab=Math.min(S.shield,d); S.shield-=ab; d-=ab; if(ab>0) log('護盾吸收 <b class="l-heal">'+ab+'</b>','l-heal'); }
  if(d>0){
    S.hp-=d;
    log(mob.def.name+(nm?'的'+nm:'')+' 命中你 <b class="l-take">-'+d+'</b>','l-take');
    if(CLASSES[S.cls].res==='rage') S.res=Math.min(100,S.res+4);
    if(S.hp<=0) playerDie();
  }
}

/* ===== 狩獵與模式 ===== */
function currentHunt(){ return S.hunt || huntable()[0].id; }
function huntable(){
  const z=ZONES[S.zone], q=curQ();
  return z.mobs.filter(m=>!m.hide || (q && q.type==='boss' && m.id===q.tgt && !S.qdone));
}
function setMode(m){
  S.mode=m;
  $('btnMode').textContent = m==='auto'?'🌙 掛機中':'⚔ 手動模式';
  $('btnMode').classList.toggle('modeOn', m==='auto');
  log(m==='auto'?'進入掛機模式:AI 技能組接手,消耗精力(效率約手動 80%)':'切回手動模式:不耗精力,手動更強','l-sys');
  if(m==='auto'&&!mob) spawn(currentHunt());
  renderSkills(); save();
}

/* ===== 渲染 ===== */
function renderHUD(){
  if(!S) return;
  const C=CLASSES[S.cls];
  $('hName').textContent='Lv'+S.lv+' '+S.name+'('+C.name+')';
  $('hZone').textContent=ZONES[S.zone].name+' · '+fmtG(S.gold);

/* ===== 離線掛機結算(GDB 14.2 批次模擬的單機版) ===== */
function offlineProgress(){
  const elapsed=Math.min(72*3600, (Date.now()-S.ts)/1000);
  if(elapsed<60) return null;
  if(S.mode!=='auto'){
    S.energy=Math.min(100, S.energy+elapsed*4/3600);
    S.rest=Math.min(4*3600, (S.rest||0)+elapsed*0.25);
    return {type:'rest', t:elapsed};
  }
  // 掛機:每 16 秒一殺(TTK15+間隔),精力耗盡後收益減半
  const hunt=ZONES[S.zone].mobs.find(m=>m.id===currentHunt())||ZONES[S.zone].mobs[0];
  const kills=Math.floor(elapsed/16);
  let xp=0, gold=0, itemsGot={}, fullSec=S.energy/8*3600;
  const q=curQ();
  for(let i=0;i<kills;i++){
    const mul=(i*16<fullSec?1:0.5);
    xp+=Math.round(F.mobXp(hunt.lv)*mul);
    for(const l of hunt.loot){
      if(l[0]==='coin') gold+=Math.round((l[1]+(l[2]-l[1])/2)*mul);
      else if(Math.random()*10000<l[1]*mul) itemsGot[l[0]]=(itemsGot[l[0]]||0)+1;
    }
    if(q&&!S.qdone&&q.type==='kill'&&q.tgt===hunt.id&&S.qn<q.n) S.qn++;
  }
  S.energy=Math.max(0, S.energy-elapsed*8/3600);
  S.kills+=kills; S.gold+=gold;
  for(const k in itemsGot){ S.bag[k]=(S.bag[k]||0)+itemsGot[k]; if(k.startsWith('it_shard')) S.shards+=itemsGot[k]; }
  gainXp(xp); checkQ();
  return {type:'idle', t:elapsed, kills, xp, gold, itemsGot, mobName:hunt.name};
}

  if(R.list.length>=MAXCHARS){ alert('角色欄位已滿'); return; }
  S=newState(name, pick.race, pick.cls);
  R.list.push(S); R.active=R.list.length-1;
  closeOv(); boot(true);
}

/* ===== 導航與啟動 ===== */
document.querySelectorAll('#nav button').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('#nav button').forEach(x=>x.classList.remove('on'));
    document.querySelectorAll('.page').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); $(b.dataset.pg).classList.add('on');
    if(b.dataset.pg==='pgChar')renderChar();
    if(b.dataset.pg==='pgBag')renderBag();
    if(b.dataset.pg==='pgQuest')renderQuest();
    if(b.dataset.pg==='pgTown')renderTown();
    if(b.dataset.pg==='pgSys')renderSys();
  };
});
$('btnMode').onclick=()=>setMode(S.mode==='auto'?'manual':'auto');
$('btnFight').onclick=()=>{ if(!mob) spawn(currentHunt()); };
$('btnGather').onclick=gather;
$('btnTown').onclick=()=>{ if(mob){ despawn(); log('你脫離了戰鬥','l-sys'); } document.querySelector('#nav button[data-pg="pgTown"]').click(); };
$('huntSel').onchange=e=>{ S.hunt=e.target.value; save(); };
document.addEventListener('keydown',e=>{
  if(!S||$('overlay')&&!$('overlay').classList.contains('hidden')) return;
  if(e.key>='1'&&e.key<='6'){ const l=learned(); const i=+e.key-1; if(l[i]&&S.mode!=='auto') useSkill(l[i][0]); }
  if(e.key==='q'||e.key==='Q') usePotion('it_hpot');
  if(e.key===' '){ e.preventDefault(); if(!mob) spawn(currentHunt()); }
});
window.addEventListener('beforeunload', save);
document.addEventListener('visibilitychange', ()=>{ if(document.hidden) save(); });

function boot(isNew){
  renderHunt(); renderSkills(); renderHUD(); renderEnemy(); renderQuestDot();
  if(isNew){
    log('<b>歡迎來到艾爾世界,'+S.name+'。</b>','l-lvl');
    log('你在'+ZONES[S.zone].name+'醒來.'+ZONES[S.zone].town+'的長者正等著你(城鎮頁)','l-sys');
    log('提示:選擇狩獵目標後按「尋找敵人」;或切換掛機模式讓 AI 接手','l-sys');
  }else{
    const r=offlineProgress();
    log('歡迎回來,'+S.name+'。','l-sys');
    if(r) showReport(r); else closeOv();
    renderHunt();
  }
  save();
}

/* 入口 */
(function(){
  R=loadRoster();
  if(R.list.length) renderSelect();
  else renderCreate();
  setInterval(tick, 250);
  setInterval(save, 10000);
})();
</script>
</body>
</html>
